version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: redteamagentloop-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # CPU-only — no GPU passthrough required.
    # Serves tinyllama:1b (~0.6GB) and gemma2:2b (~1.6GB) as target models.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chromadb:
    image: chromadb/chroma:latest
    container_name: redteamagentloop-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ollama_data:
  chroma_data:
