version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: redteamagentloop-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # CPU-only — no GPU passthrough required.
    # Serves tinyllama:1b (~0.6GB) and gemma2:2b (~1.6GB) as target models.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chromadb:
    image: chromadb/chroma:latest
    container_name: redteamagentloop-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  console:
    build:
      context: .
      dockerfile: console/Dockerfile
    container_name: redteamagentloop-console
    ports:
      - "8000:8000"   # FastAPI SSE backend (serves built React UI at /)
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./reports:/app/reports   # persist HTML reports and logs across restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  ollama_data:
  chroma_data:
